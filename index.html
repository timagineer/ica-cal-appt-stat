<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EHR Appointment Status Calendar</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#fff;color:#111}
  .wrap{width:100%;max-width:1400px;margin:0 auto;padding:20px 16px 40px}
  .month-label{font-size:13px;font-weight:500;color:#111;margin-bottom:10px}
  .dow-row{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;margin-bottom:1px}
  .dow{font-size:10px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:#767676;text-align:center;padding:5px 0}
  .dow.wknd{color:#a8a8a8}
  .grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:#e8e8e6;border:1px solid #e8e8e6}
  .cell{background:#fff;aspect-ratio:1.35/1;padding:8px 9px 9px;display:flex;flex-direction:column}
  .cell.other{background:#fafaf9}
  .cell.other .dn{color:#c4c4c0}
  .cell.wknd{background:#f9f9f8}
  .cell.today .dn{font-weight:600;color:#111}
  .dn{font-size:11px;color:#767676;line-height:1;margin-bottom:5px;flex-shrink:0}
  .appts{display:flex;flex-direction:column;gap:4px}
  .appt{display:flex;align-items:center;justify-content:flex-end;gap:5px}
  .dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
  .slabel{font-size:10.5px;color:#595959;white-space:nowrap;line-height:1}
  .legend{display:flex;flex-wrap:wrap;gap:7px 20px;margin-top:12px;padding:11px 0 0;border-top:1px solid #e8e8e6}
  .leg{display:flex;align-items:center;gap:5px;font-size:10.5px;color:#595959}
  .leg .dot{width:7px;height:7px}
  .divider{border:none;border-top:1px solid #e8e8e6;margin:36px 0}
  .writeup{color:#595959;font-size:13px;line-height:1.7;max-width:880px}
  .writeup h2{font-size:13px;font-weight:500;color:#111;margin-bottom:14px;letter-spacing:.01em}
  .writeup p{margin-bottom:20px}
  .groups{display:grid;grid-template-columns:repeat(2,1fr);gap:20px 40px;margin-top:4px}
  .group-head{display:flex;align-items:center;gap:7px;margin-bottom:5px}
  .group-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .group-name{font-size:12px;font-weight:500;color:#111}
  .group-statuses{font-size:11.5px;color:#767676;margin-bottom:4px}
  .group-desc{font-size:12px;color:#595959;line-height:1.6}
  @media (max-width: 640px){
    .groups{grid-template-columns:1fr}
  }
</style>
</head>
<body>

<div class="wrap">
  <div class="month-label">June 2026</div>
  <div class="dow-row">
    <div class="dow wknd">Sun</div>
    <div class="dow">Mon</div><div class="dow">Tue</div><div class="dow">Wed</div>
    <div class="dow">Thu</div><div class="dow">Fri</div>
    <div class="dow wknd">Sat</div>
  </div>
  <div class="grid" id="grid"></div>
  <div class="legend" id="legend"></div>

  <hr class="divider">

  <div class="writeup">
    <h2>Appointment status system</h2>
    <p>Statuses are grouped into five conceptual phases, each with a distinct hue. Color encodes where an appointment stands in its lifecycle &mdash; not just its name &mdash; so patterns across a day or week read at a glance.</p>
    <div class="groups" id="groups"></div>
  </div>
</div>

<script>
const C = {
  scheduled:   'oklch(51.1% 0.262 276.966)',
  rescheduled: 'oklch(51.1% 0.262 276.966)',
  confirmed:   'oklch(58.8% 0.158 241.966)',
  arrived:     'oklch(60% 0.118 184.704)',
  checkedin:   'oklch(60% 0.118 184.704)',
  occurred:    'oklch(53.2% 0.157 131.589)',
  cancelled:   'oklch(66.6% 0.179 58.318)',
  late:        'oklch(64.6% 0.222 41.116)',
  noshow:      'oklch(57.7% 0.245 27.325)',
};

const LBL = {
  scheduled:'Scheduled', rescheduled:'Rescheduled',
  confirmed:'Confirmed', arrived:'Arrived', checkedin:'Checked-in',
  occurred:'Occurred', cancelled:'Cancelled', late:'Late cancel', noshow:'No-show',
};

const LEGEND = [
  {label:'Scheduled',   key:'scheduled'},
  {label:'Rescheduled', key:'rescheduled'},
  {label:'Confirmed',   key:'confirmed'},
  {label:'Arrived',     key:'arrived'},
  {label:'Checked-in',  key:'checkedin'},
  {label:'Occurred',    key:'occurred'},
  {label:'Cancelled',   key:'cancelled'},
  {label:'Late cancel', key:'late'},
  {label:'No-show',     key:'noshow'},
];

const GROUPS = [
  {
    name: 'Scheduling',
    color: C.scheduled,
    statuses: 'Scheduled · Rescheduled',
    desc: 'The appointment exists as a data object. A time slot is held but no commitment has been made. Rescheduled shares this hue because it represents the same logical state — a revised slot, not a different phase.',
  },
  {
    name: 'Pre-visit',
    color: C.confirmed,
    statuses: 'Confirmed',
    desc: 'The patient has acknowledged the appointment, typically via reminder response or portal action. No physical movement yet, but intent is established. Blue bridges the cool scheduling phase and the warmer on-site engagement phase.',
  },
  {
    name: 'Engagement',
    color: C.arrived,
    statuses: 'Arrived · Checked-in',
    desc: 'The patient is physically on-site and moving through the arrival process. Arrived and Checked-in share a hue because they are sequential steps within the same on-site moment, distinguished by label rather than color.',
  },
  {
    name: 'Completed',
    color: C.occurred,
    statuses: 'Occurred',
    desc: 'The appointment took place. Green is reserved solely for this positive terminal outcome so it carries unambiguous meaning — any green on the calendar means care was delivered.',
  },
  {
    name: 'Did not occur',
    color: C.cancelled,
    statuses: 'Cancelled · Late cancel · No-show',
    desc: 'All three represent a failure to complete, but with different operational consequence. The hue shifts from amber through orange-red as severity increases: Cancelled is a managed outcome, Late cancel disrupts scheduling, No-show is the most clinically and operationally significant.',
  },
];

const APPTS = {
  1:['occurred','confirmed'], 2:['noshow'], 3:['scheduled','arrived'],
  4:['confirmed','occurred'], 5:['rescheduled','checkedin'],
  8:['confirmed','late'], 9:['occurred','scheduled'], 10:['noshow','arrived'],
  11:['cancelled','occurred'], 12:['rescheduled','confirmed'],
  15:['late','occurred'], 16:['checkedin','scheduled'], 17:['noshow','confirmed'],
  18:['occurred','arrived'], 19:['cancelled','checkedin'],
  22:['rescheduled','late'], 23:['scheduled','cancelled'],
  24:['occurred','confirmed'], 25:['noshow','checkedin'], 26:['arrived','occurred'],
  29:['late','occurred'], 30:['rescheduled','confirmed'],
};

const grid = document.getElementById('grid');
const startDow = 1; // June 2026 starts Monday
const daysInMonth = 30;
const totalCells = Math.ceil((startDow + daysInMonth) / 7) * 7;

for(let i = 0; i < totalCells; i++){
  const col = i % 7;
  const isWknd = col === 0 || col === 6;
  const dayNum = i - startDow + 1;
  const isOther = dayNum < 1 || dayNum > daysInMonth;
  const isToday = dayNum === 29;

  const cell = document.createElement('div');
  cell.className = 'cell' +
    (isOther ? ' other' : '') +
    (isWknd  ? ' wknd'  : '') +
    (isToday ? ' today' : '');

  let dn = dayNum < 1 ? 31 + dayNum : dayNum > daysInMonth ? dayNum - daysInMonth : dayNum;
  const appts = (!isOther && !isWknd && APPTS[dayNum]) ? APPTS[dayNum] : [];

  let html = '<div class="dn">' + dn + '</div><div class="appts">';
  appts.forEach(s => {
    html += '<div class="appt"><span class="slabel">' + LBL[s] + '</span><span class="dot" style="background:' + C[s] + '"></span></div>';
  });
  html += '</div>';
  cell.innerHTML = html;
  grid.appendChild(cell);
}

const leg = document.getElementById('legend');
LEGEND.forEach(g => {
  leg.innerHTML += '<div class="leg"><span class="dot" style="background:' + C[g.key] + '"></span><span>' + g.label + '</span></div>';
});

const groupsEl = document.getElementById('groups');
GROUPS.forEach(g => {
  groupsEl.innerHTML += '<div class="group">' +
    '<div class="group-head"><span class="group-dot" style="background:' + g.color + '"></span>' +
    '<span class="group-name">' + g.name + '</span></div>' +
    '<div class="group-statuses">' + g.statuses + '</div>' +
    '<div class="group-desc">' + g.desc + '</div></div>';
});
</script>

</body>
</html>
